name: Build & Publish

on:
  push:
    tags:
      - 'v*'
  repository_dispatch:
    types:
      - release-from-auto-tag
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.sha || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      # Python tooling mirrors xUnitTests.yaml so the same integration tests
      # that run on push/PR also run on the release-build path. Without this
      # the SiEPIC PdkOffset tests skip silently here (graceful skip), which
      # means the release build never actually validates the SiEPIC render
      # path that's the core of this release.
      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Nazca + KLayout + SiEPIC PDK + gdstk (for PdkOffset tests)
        run: |
          set -euo pipefail
          pip install gdstk klayout siepic_ebeam_pdk
          pip install "https://github.com/aignermax/Lunima/releases/download/vendor-cache-nazca-0.6.1/nazca-0.6.1.tar.gz"
          python3 -c "import nazca, nazca.demofab, gdstk, klayout.db, siepic_ebeam_pdk; print('PDK preview deps ok')"

      - name: Test
        working-directory: UnitTests
        env:
          LUNIMA_TEST_PYTHON3: ${{ steps.setup-python.outputs.python-path }}
          MPLBACKEND: Agg
          QT_QPA_PLATFORM: offscreen
        run: dotnet test --no-restore

  build:
    name: Build ${{ matrix.rid }}
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: Lunima-win-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: Lunima-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.sha || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish
        run: >
          dotnet publish CAP.Desktop/CAP.Desktop.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -o publish

      - name: Rename executable
        run: |
          cd publish
          if [ -f CAP.Desktop ]; then
            mv CAP.Desktop Lunima
            chmod +x Lunima
          fi
          if [ -f CAP.Desktop.exe ]; then
            mv CAP.Desktop.exe Lunima.exe
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/

  build-msi:
    name: Build MSI Installer
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.sha || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Extract version from csproj
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content CAP.Desktop/CAP.Desktop.csproj
          $version = $csproj.Project.PropertyGroup.Version
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Extracted version: $version"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install Pillow

      - name: Generate Lunima icon
        run: python scripts/generate_icon.py --output Installer/LunimaIcon.ico

      - name: Install WiX Toolset
        run: dotnet tool install --global wix --version 4.0.5

      - name: Install WiX extensions
        run: |
          wix extension add WixToolset.UI.wixext/4.0.5
          wix extension add WixToolset.NetFx.wixext/4.0.5

      - name: Publish app for MSI
        run: >
          dotnet publish CAP.Desktop/CAP.Desktop.csproj
          -c Release
          -r win-x64
          --self-contained false
          -p:Version=${{ steps.version.outputs.version }}
          -o publish/win-x64-msi

      - name: Generate HarvestedFiles.wxs
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File Installer/Generate-HarvestedFiles.ps1 -PublishDir publish/win-x64-msi -OutputFile HarvestedFiles.wxs

      - name: Build MSI
        shell: pwsh
        run: |
          $publishPath = "${{ github.workspace }}\publish\win-x64-msi\"
          dotnet build Installer/Installer.wixproj -c Release -p:PublishDir=$publishPath -p:ProductVersion=${{ steps.version.outputs.version }}

      - name: Rename MSI with version
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Copy-Item Installer/bin/Release/Lunima-Setup.msi "Lunima-Setup-$version.msi"
          echo "Created Lunima-Setup-$version.msi"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lunima-MSI-Installer
          path: Lunima-Setup-*.msi

  release:
    name: Create Release
    needs: [build, build-msi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.sha || github.ref }}

      - name: Compute release info
        id: info
        run: |
          version=$(grep '<Version>' CAP.Desktop/CAP.Desktop.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/' | xargs)

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            tag="${{ github.event.client_payload.tag }}"
            version="${{ github.event.client_payload.version }}"
            echo "Using dispatched release info: $tag ($version)"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"
            echo "Using pushed tag: $tag"
          else
            tag="v${version}-build.${{ github.run_number }}"
            echo "Creating manual build tag: $tag"
          fi

          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=$tag" >> $GITHUB_OUTPUT

          if [ "$tag" != "v$version" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "::warning::Tag '$tag' does not match csproj version 'v$version'"
          fi

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: Lunima-win-x64
          path: win-x64

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: Lunima-linux-x64
          path: linux-x64

      - name: Download MSI installer
        uses: actions/download-artifact@v4
        with:
          name: Lunima-MSI-Installer
          path: msi

      - name: Create archives
        run: |
          cd win-x64 && zip -r ../Lunima-${{ steps.info.outputs.version }}-win-x64.zip . && cd ..
          cd linux-x64 && tar czf ../Lunima-${{ steps.info.outputs.version }}-linux-x64.tar.gz . && cd ..

      - name: Generate Changelog
        id: changelog
        run: |
          # Get the previous tag
          git fetch --tags
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "build" | head -2 | tail -1)
          CURR_TAG="${{ steps.info.outputs.tag }}"

          echo "Generating changelog from $PREV_TAG to $CURR_TAG"

          # Get commits since last release tag
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log $PREV_TAG..$CURR_TAG --pretty=format:"- %s" --no-merges)
            COMMIT_COUNT=$(git rev-list --count $PREV_TAG..$CURR_TAG --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | head -20)
            COMMIT_COUNT=$(git rev-list --count HEAD --no-merges)
          fi

          # Categorize commits
          FEATURES=$(echo "$COMMITS" | grep -iE "^- (feat|feature|add|implement):" || true)
          FIXES=$(echo "$COMMITS" | grep -iE "^- (fix|bugfix):" || true)
          IMPROVEMENTS=$(echo "$COMMITS" | grep -iE "^- (refactor|improve|update|enhance|chore):" || true)
          BREAKING=$(echo "$COMMITS" | grep -iE "BREAKING|breaking change" || true)
          OTHER=$(echo "$COMMITS" | grep -viE "^- (feat|feature|add|implement|fix|bugfix|refactor|improve|update|enhance|chore):" || true)

          # Build changelog sections
          CHANGELOG=""

          if [ -n "$FEATURES" ]; then
            CHANGELOG+="### ✨ New Features"$'\n'"$FEATURES"$'\n\n'
          fi

          if [ -n "$FIXES" ]; then
            CHANGELOG+="### 🐛 Bug Fixes"$'\n'"$FIXES"$'\n\n'
          fi

          if [ -n "$IMPROVEMENTS" ]; then
            CHANGELOG+="### 🔧 Improvements"$'\n'"$IMPROVEMENTS"$'\n\n'
          fi

          if [ -n "$BREAKING" ]; then
            CHANGELOG+="### ⚠️ Breaking Changes"$'\n'"$BREAKING"$'\n\n'
          fi

          if [ -n "$OTHER" ] && [ $(echo "$OTHER" | wc -l) -gt 0 ]; then
            CHANGELOG+="### 📝 Other Changes"$'\n'"$OTHER"$'\n\n'
          fi

          # Add commit summary
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG+="---"$'\n'"**$COMMIT_COUNT commits** since $PREV_TAG"
          else
            CHANGELOG+="---"$'\n'"**$COMMIT_COUNT commits** in this release"
          fi

          # Save to output (use delimiter for multiline)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: Lunima v${{ steps.info.outputs.version }}
          body: |
            ## Lunima v${{ steps.info.outputs.version }}

            ${{ steps.changelog.outputs.changelog }}

            ## 📦 Installation

            ### Windows (Recommended - MSI Installer)
            1. Download `Lunima-Setup-${{ steps.info.outputs.version }}.msi`
            2. Run the installer
            3. Desktop shortcut and Start Menu entry will be created automatically

            **Requirements:** .NET 8 Desktop Runtime (x64) - installer will check and prompt if missing

            ### Windows (Portable)
            1. Download `Lunima-${{ steps.info.outputs.version }}-win-x64.zip`
            2. Extract and run `Lunima.exe`

            ### Linux
            1. Download `Lunima-${{ steps.info.outputs.version }}-linux-x64.tar.gz`
            2. Extract: `tar xzf Lunima-*.tar.gz`
            3. Run: `./Lunima`

            No .NET installation required for portable versions — everything is included.

            ---
            **Commit:** ${{ github.sha }}
          files: |
            msi/Lunima-Setup-${{ steps.info.outputs.version }}.msi
            Lunima-${{ steps.info.outputs.version }}-win-x64.zip
            Lunima-${{ steps.info.outputs.version }}-linux-x64.tar.gz
