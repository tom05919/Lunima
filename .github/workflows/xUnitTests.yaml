name: 🔍 xUnit Tests

# Run on PRs (the required check for branch protection) and on pushes to main
# only. Previously `push:` had no branch filter, so a push to a branch that also
# had an open PR triggered BOTH events → the suite ran twice.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  nunit_tests:
    name: 🔍 xUnit Tests
    runs-on: ubuntu-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true

    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: 'recursive'

      - name: 💽 Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: 📦 Restore Dependencies
        run: dotnet restore

      - name: 🐍 Setup Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔦 Install PhotonTorch (for Phase 3 export integration tests)
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          # scipy is a transitive dep of photontorch 0.4.1 but missing from its
          # published requirements — install it explicitly so `import photontorch`
          # doesn't fail with ModuleNotFoundError on a fresh runner.
          pip install photontorch torch matplotlib scipy
          # Verify the import works with the exact probe the test uses.
          python3 -c "import photontorch; print('photontorch', photontorch.__version__)"

      - name: 🌊 Install sax (for PICWave export integration tests)
        run: |
          set -euo pipefail
          # sax is the S-parameter library Simphony 0.7+ builds on. The PICWave
          # exporter emits a sax-based script; the E2E tests execute it and
          # inspect the returned transmission.
          pip install sax
          python3 -c "import sax, numpy, matplotlib; print('sax', sax.__version__)"

      - name: ⚡ Install OpenVAF (for Phase 4 Verilog-A export integration tests)
        run: |
          set -euo pipefail
          # Dev build — no tagged release channel exists yet. Verify the binary
          # runs before relying on it so a broken upload blocks CI loudly.
          curl -fL https://openva.fra1.digitaloceanspaces.com/openvaf_devel-x86_64-unknown-linux-gnu.tar.gz -o /tmp/openvaf.tar.gz
          mkdir -p /tmp/openvaf
          tar xf /tmp/openvaf.tar.gz -C /tmp/openvaf
          sudo install -m 755 /tmp/openvaf/openvaf /usr/local/bin/openvaf
          openvaf --help > /dev/null

      - name: 🔌 Install NGSpice (for Verilog-A runtime simulation tests)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ngspice
          ngspice --version | head -1

      - name: 🎨 Install Nazca + KLayout + SiEPIC PDK (for PDK Offset Editor tests)
        run: |
          set -euo pipefail
          # gdstk: GDS polygon reader for the demo-PDK render path.
          # klayout / siepic_ebeam_pdk: required for the SiEPIC fixed-cell
          # and PCell rendering paths exercised by NazcaComponentPreviewService.
          pip install gdstk klayout siepic_ebeam_pdk
          # Nazca is AGPLv3+ but not published on PyPI (the PyPI 'nazca'
          # package is an unrelated Logilab data-mining library). We mirror
          # the upstream tarball as a Lunima release asset and install from
          # there — Lunima only invokes Nazca as a subprocess, so no linking.
          # Upstream source: https://nazca-design.org/download/
          pip install "https://github.com/aignermax/Lunima/releases/download/vendor-cache-nazca-0.6.1/nazca-0.6.1.tar.gz"
          python3 -c "import nazca, nazca.demofab, gdstk, klayout.db, siepic_ebeam_pdk; print('PDK preview deps ok')"

      - name: 🏃 Run xUnit Tests
        working-directory: UnitTests
        env:
          # actions/setup-python installs into /opt/hostedtoolcache, not /usr/bin.
          # FindWorkingPython3 checks this env var first so the test subprocess
          # uses the same interpreter we just pip-installed nazca/klayout into.
          LUNIMA_TEST_PYTHON3: ${{ steps.setup-python.outputs.python-path }}
          # Force matplotlib + Qt to non-interactive backends — Nazca's import
          # chain pulls these in, and on a headless CI runner they otherwise
          # block the render subprocess waiting for a display.
          MPLBACKEND: Agg
          QT_QPA_PLATFORM: offscreen
        run: dotnet test --no-restore
